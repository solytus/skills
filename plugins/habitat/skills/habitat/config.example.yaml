# Habitat instance config (Tier-2 — system pointers). Copy to ~/.solytus/habitat/config.yaml.
# Read by scripts/config.py (a minimal FLAT reader — keep it flat `key: value`).
# This is NOT your preferences — those live in <data_root>/profile/ and are edited via the skill.

version: 1                       # config schema version — leave as-is; the skill migrates it

# Where your Habitat data lives (profile, places, evaluations, cache). Absolute path or ~.
# Override at runtime with the HABITAT_DATA_ROOT env var. Default: ~/.solytus/habitat/data
data_root: ~/.solytus/habitat/data

# Optional. Reserved for the future multi-tenant / MCP path; keep "local" for personal use.
tenant_id: local
